<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 5" shape-rendering="crispEdges">
  <!-- Pixel-cloud favicon. Colors mirror --color-cloud-pink / --color-cloud-pink-edge. -->
  <!-- interior -->
  <rect x="2" y="1" width="4" height="1" fill="#F6C6CF"/>
  <rect x="1" y="2" width="6" height="1" fill="#F6C6CF"/>
  <rect x="1" y="3" width="6" height="1" fill="#F6C6CF"/>
  <!-- edge pixels -->
  <rect x="2" y="0" width="4" height="1" fill="#EFA6B4"/>
  <rect x="1" y="1" width="1" height="1" fill="#EFA6B4"/>
  <rect x="6" y="1" width="1" height="1" fill="#EFA6B4"/>
  <rect x="0" y="2" width="1" height="1" fill="#EFA6B4"/>
  <rect x="7" y="2" width="1" height="1" fill="#EFA6B4"/>
  <rect x="0" y="3" width="1" height="1" fill="#EFA6B4"/>
  <rect x="7" y="3" width="1" height="1" fill="#EFA6B4"/>
  <rect x="1" y="4" width="6" height="1" fill="#EFA6B4"/>
</svg>
