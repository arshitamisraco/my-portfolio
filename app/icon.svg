<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 6" shape-rendering="crispEdges">
  <!-- Pixel-cloud favicon: PixelCloud cumulus / pink variant. -->
  <!-- Colors mirror the cloud-pink (#f6c6cf) / cloud-pink-edge (#efa6b4) tokens. -->
  <!-- interior -->
  <rect x="4" y="1" width="3" height="1" fill="#f6c6cf"/>
  <rect x="2" y="2" width="6" height="1" fill="#f6c6cf"/>
  <rect x="9" y="2" width="1" height="1" fill="#f6c6cf"/>
  <rect x="1" y="3" width="10" height="1" fill="#f6c6cf"/>
  <rect x="1" y="4" width="10" height="1" fill="#f6c6cf"/>
  <!-- dithered edge -->
  <rect x="4" y="0" width="3" height="1" fill="#efa6b4"/>
  <rect x="2" y="1" width="2" height="1" fill="#efa6b4"/>
  <rect x="7" y="1" width="1" height="1" fill="#efa6b4"/>
  <rect x="9" y="1" width="2" height="1" fill="#efa6b4"/>
  <rect x="1" y="2" width="1" height="1" fill="#efa6b4"/>
  <rect x="8" y="2" width="1" height="1" fill="#efa6b4"/>
  <rect x="10" y="2" width="1" height="1" fill="#efa6b4"/>
  <rect x="0" y="3" width="1" height="1" fill="#efa6b4"/>
  <rect x="11" y="3" width="1" height="1" fill="#efa6b4"/>
  <rect x="0" y="4" width="1" height="1" fill="#efa6b4"/>
  <rect x="11" y="4" width="1" height="1" fill="#efa6b4"/>
  <rect x="1" y="5" width="10" height="1" fill="#efa6b4"/>
</svg>
